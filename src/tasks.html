<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskBoard - タスク一覧</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- ヘッダー：アプリ名とログアウトボタン -->
    <header class="app-header">
      <h1>TaskBoard</h1>
      <button
        data-testid="logout-button"
        class="btn btn-secondary"
      >
        ログアウト
      </button>
    </header>

    <main class="container">
      <!-- タスク追加エリア -->
      <div class="task-add-area">
        <input
          type="text"
          data-testid="task-title-input"
          placeholder="タスクタイトルを入力（50文字以内）"
        />
        <button
          data-testid="add-task-button"
          class="btn btn-primary"
        >
          追加
        </button>
      </div>

      <!-- バリデーションエラー（追加時の入力不正） -->
      <div
        data-testid="validation-error"
        class="error-message"
        hidden
      ></div>

      <!-- 検索エリア -->
      <div class="search-area">
        <input
          type="text"
          data-testid="search-input"
          placeholder="キーワードで検索..."
        />
      </div>

      <!-- 0件時のメッセージ -->
      <p
        data-testid="empty-message"
        class="empty-message"
        hidden
      >
        該当するタスクはありません
      </p>

      <!-- タスク一覧（JavaScriptで動的に描画） -->
      <ul data-testid="task-list" class="task-list"></ul>
    </main>

    <!-- タスク一覧のロジックを読み込む -->
    <script type="module" src="./taskList.ts"></script>
  </body>
</html>
